<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LABYRINTH - 8-BIT ARCADE</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: monospace;
    overflow-x: hidden;
  }
  #gameContainer {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    width: 100%;
    max-width: 560px;
    padding: 0 4px;
  }
  #hud {
    display: flex;
    justify-content: space-between;
    width: 100%;
    color: #fff;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 0;
    image-rendering: pixelated;
  }
  #hud span { color: #ffdd00; }
  #canvas-wrapper {
    position: relative;
    width: 100%;
  }
  canvas {
    border: 3px solid #444;
    image-rendering: pixelated;
    display: block;
    width: 100%;
    height: auto;
  }
  #overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.85);
    color: #fff;
  }
  #overlay h1 {
    font-size: 42px;
    letter-spacing: 6px;
    color: #ffdd00;
    text-shadow: 3px 3px 0 #c80000;
    margin-bottom: 10px;
    animation: blink 1s step-end infinite;
  }
  #overlay .subtitle {
    font-size: 13px;
    color: #aaa;
    letter-spacing: 4px;
    margin-bottom: 30px;
  }
  #overlay .press-start {
    font-size: 16px;
    letter-spacing: 3px;
    color: #fff;
    animation: blink 0.7s step-end infinite;
    margin-top: 20px;
  }
  #overlay .controls {
    font-size: 11px;
    color: #666;
    letter-spacing: 2px;
    margin-top: 16px;
    line-height: 2;
    text-align: center;
  }
  #overlay .gameover-score {
    font-size: 18px;
    color: #ffdd00;
    letter-spacing: 3px;
    margin-top: 10px;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
  @media (max-width: 480px) {
    #hud { font-size: 10px; letter-spacing: 1px; }
    #overlay h1 { font-size: 26px; letter-spacing: 3px; }
    #overlay .subtitle { font-size: 10px; letter-spacing: 2px; margin-bottom: 16px; }
    #overlay .press-start { font-size: 12px; }
    #overlay .controls { font-size: 9px; }
    #overlay .gameover-score { font-size: 13px; }
  }
  @media (max-width: 360px) {
    #overlay h1 { font-size: 20px; }
    #hud { font-size: 9px; }
  }
</style>
</head>
<body>
<div id="gameContainer">
  <div id="hud">
    <div>SCORE: <span id="scoreDisplay">0</span></div>
    <div>LEVEL: <span id="levelDisplay">1</span></div>
    <div>LIVES: <span id="livesDisplay">♥♥♥</span></div>
  </div>
  <div id="canvas-wrapper">
  <canvas id="gameCanvas" width="560" height="560"></canvas>
  <div id="overlay">
    <h1>LABYRINTH</h1>
    <div class="subtitle">★ 8-BIT ARCADE ★</div>
    <div class="press-start">PRESS SPACE TO START</div>
    <div class="controls">
      WASD / ARROW KEYS — MOVE<br>
      REACH THE EXIT ★ AVOID THE MINOTAUR
    </div>
  </div>
  </div><!-- /canvas-wrapper -->
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');

const TILE = 28;
const COLS = 20;
const ROWS = 20;
const W = COLS * TILE;
const H = ROWS * TILE;

// --- COLOR PALETTE ---
const PAL = {
  wall:    '#1a0a4a',
  wallHL:  '#3a1a8a',
  floor:   '#0a0820',
  exit:    '#00ffcc',
  exitGlow:'#004433',
  player:  '#00ff44',
  playerD: '#005511',
  torch:   '#ffaa00',
  enemy:   '#ff2244',
  enemyD:  '#550011',
  key:     '#ffdd00',
  keyGlow: '#332200',
  gem:     '#aa44ff',
  text:    '#ffffff',
};

// --- AUDIO ---
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audio;
function initAudio() {
  if (!audio) audio = new AudioCtx();
}
function beep(freq, dur, type='square', vol=0.15, decay=false) {
  if (!audio) return;
  const osc = audio.createOscillator();
  const gain = audio.createGain();
  osc.connect(gain); gain.connect(audio.destination);
  osc.type = type; osc.frequency.value = freq;
  gain.gain.value = vol;
  if (decay) gain.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + dur);
  osc.start(); osc.stop(audio.currentTime + dur);
}
function sfxStep()   { beep(200 + Math.random()*50, 0.04, 'square', 0.05, true); }
function sfxPickup() { beep(880, 0.05); beep(1100, 0.08); }
function sfxDie()    { [400,300,200,100].forEach((f,i) => setTimeout(()=>beep(f,0.12,'sawtooth',0.2,true),i*100)); }
function sfxLevel()  { [523,659,784,1047].forEach((f,i) => setTimeout(()=>beep(f,0.15,'square',0.18),i*100)); }
function sfxExit()   { [784,988,1175,1568].forEach((f,i) => setTimeout(()=>beep(f,0.12,'square',0.18),i*80)); }

// --- MAZE GENERATION (recursive backtracker) ---
function generateMaze(cols, rows) {
  const grid = Array.from({length: rows}, () => new Array(cols).fill(0b1111)); // bits: N E S W
  const visited = Array.from({length: rows}, () => new Array(cols).fill(false));
  const dx = [0,1,0,-1], dy = [-1,0,1,0];
  const opp = [2,3,0,1];
  function carve(x, y) {
    visited[y][x] = true;
    const dirs = [0,1,2,3].sort(()=>Math.random()-0.5);
    for (const d of dirs) {
      const nx = x + dx[d], ny = y + dy[d];
      if (nx<0||nx>=cols||ny<0||ny>=rows||visited[ny][nx]) continue;
      grid[y][x] &= ~(1<<d);
      grid[ny][nx] &= ~(1<<opp[d]);
      carve(nx, ny);
    }
  }
  carve(0, 0);
  // Add extra passages to create loops — gives the player alternate routes to escape
  const extraPassages = Math.floor(cols * rows * 0.25);
  for (let i = 0; i < extraPassages; i++) {
    const x = Math.floor(Math.random() * cols);
    const y = Math.floor(Math.random() * rows);
    const d = Math.floor(Math.random() * 4);
    const nx = x + dx[d], ny = y + dy[d];
    if (nx < 0 || nx >= cols || ny < 0 || ny >= rows) continue;
    grid[y][x] &= ~(1 << d);
    grid[ny][nx] &= ~(1 << opp[d]);
  }
  return grid;
}

// --- GAME STATE ---
let state = 'title'; // title | playing | dead | levelup | gameover
let score = 0, lives = 3, level = 1;
let maze, player, enemies, items, exit, torches;
let stepTimer = 0, enemyTimer = 0;
let deathTimer = 0, levelTimer = 0;
let flashTimer = 0;
let invincibleTimer = 0;
let particles = [];
let gemCount = 0;

function initLevel() {
  maze = generateMaze(COLS, ROWS);
  player = { x: 0, y: 0, moving: false, dx: 0, dy: 0, steps: 0 };
  exit = { x: COLS-1, y: ROWS-1 };

  // Place enemies (minotaurs) — more per level, start far from player
  enemies = [];
  // One minotaur, placed in the far half of the maze (away from player start)
  let ex, ey;
  do {
    ex = Math.floor(Math.random() * (COLS / 2)) + Math.floor(COLS / 2);
    ey = Math.floor(Math.random() * (ROWS / 2)) + Math.floor(ROWS / 2);
  } while (ex === COLS-1 && ey === ROWS-1);
  enemies.push({ x: ex, y: ey, spawnX: ex, spawnY: ey });

  // Place collectibles
  items = [];
  gemCount = 0;
  const numGems = 5 + level * 2;
  for (let i = 0; i < numGems; i++) {
    let gx, gy;
    do { gx = Math.floor(Math.random()*COLS); gy = Math.floor(Math.random()*ROWS); }
    while ((gx===0&&gy===0)||(gx===COLS-1&&gy===ROWS-1) || items.some(it=>it.x===gx&&it.y===gy));
    items.push({ x: gx, y: gy, type: 'gem', collected: false });
  }

  // Torches (decorative + light)
  torches = [];
  for (let i = 0; i < 10 + level; i++) {
    torches.push({ x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS), flicker: Math.random() });
  }

  particles = [];
  invincibleTimer = 120; // brief grace period at level start too
  updateHUD();
}

function updateHUD() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('levelDisplay').textContent = level;
  document.getElementById('livesDisplay').textContent = '♥'.repeat(lives) + '♡'.repeat(Math.max(0,3-lives));
}

// --- PATHFINDING (BFS) ---
function bfsPath(maze, sx, sy, tx, ty) {
  if (sx===tx && sy===ty) return [];
  const queue = [[sx, sy, []]];
  const visited = new Set([`${sx},${sy}`]);
  const dx = [0,1,0,-1], dy = [-1,0,1,0];
  while (queue.length) {
    const [x, y, path] = queue.shift();
    const dirs = [0,1,2,3];
    for (const d of dirs) {
      if (maze[y][x] & (1<<d)) continue; // wall
      const nx = x+dx[d], ny = y+dy[d];
      const key = `${nx},${ny}`;
      if (!visited.has(key)) {
        visited.add(key);
        const np = [...path, d];
        if (nx===tx && ny===ty) return np;
        queue.push([nx, ny, np]);
      }
    }
  }
  return [];
}

// --- MOVEMENT ---
const DIRS = { ArrowUp:0, ArrowRight:1, ArrowDown:2, ArrowLeft:3, w:0, d:1, s:2, a:3, W:0, D:1, S:2, A:3 };
const DX = [0,1,0,-1], DY = [-1,0,1,0];
let keysDown = {};

document.addEventListener('keydown', e => {
  if (e.code === 'Space' && (state === 'title' || state === 'gameover')) {
    initAudio(); startGame(); return;
  }
  if (state !== 'playing') return;
  keysDown[e.key] = true;
});
document.addEventListener('keyup', e => { delete keysDown[e.key]; });

// Touch / swipe controls
let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  if (state === 'title' || state === 'gameover') { initAudio(); startGame(); }
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchend', e => {
  if (state !== 'playing') return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
  keysDown = {};
  if (Math.abs(dx) > Math.abs(dy)) {
    keysDown[dx > 0 ? 'ArrowRight' : 'ArrowLeft'] = true;
  } else {
    keysDown[dy > 0 ? 'ArrowDown' : 'ArrowUp'] = true;
  }
  setTimeout(() => { keysDown = {}; }, 200);
  e.preventDefault();
}, { passive: false });

function tryMove() {
  for (const key of Object.keys(keysDown)) {
    const d = DIRS[key];
    if (d === undefined) continue;
    const nx = player.x + DX[d], ny = player.y + DY[d];
    if (nx<0||nx>=COLS||ny<0||ny>=ROWS) continue;
    if (maze[player.y][player.x] & (1<<d)) continue; // wall
    player.x = nx; player.y = ny;
    player.steps++;
    sfxStep();
    checkCollect();
    checkExit();
    checkDeath();
    return;
  }
}

function checkCollect() {
  for (const it of items) {
    if (!it.collected && it.x === player.x && it.y === player.y) {
      it.collected = true;
      score += 50 * level;
      gemCount++;
      sfxPickup();
      spawnParticles(player.x, player.y, PAL.gem, 6);
      updateHUD();
    }
  }
}

function checkExit() {
  if (player.x === exit.x && player.y === exit.y) {
    sfxExit();
    score += 500 * level;
    state = 'levelup';
    levelTimer = 120;
    spawnParticles(exit.x, exit.y, PAL.exit, 12);
    updateHUD();
  }
}

function checkDeath() {
  for (const e of enemies) {
    if (e.x === player.x && e.y === player.y) {
      sfxDie();
      lives--;
      spawnParticles(player.x, player.y, PAL.player, 10);
      updateHUD();
      if (lives <= 0) {
        state = 'gameover';
        showOverlay('gameover');
      } else {
        state = 'dead';
        deathTimer = 90;
      }
      return;
    }
  }
}

// --- PARTICLES ---
function spawnParticles(tx, ty, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x: tx * TILE + TILE/2, y: ty * TILE + TILE/2,
      vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4,
      life: 30 + Math.random()*20, maxLife: 50,
      color, size: 2 + Math.random()*3
    });
  }
}

function updateParticles() {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.1;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// --- ENEMY AI ---
function moveEnemies() {
  const speed = Math.max(28, 55 - level * 2);
  enemyTimer++;
  if (enemyTimer < speed) return;
  enemyTimer = 0;
  if (invincibleTimer > 0) return; // don't move enemies while player is invincible
  const chaseRange = 7 + level; // maze-distance tiles before enemy locks on
  for (const e of enemies) {
    const manhattan = Math.abs(e.x - player.x) + Math.abs(e.y - player.y);
    if (manhattan <= chaseRange) {
      // Chase: BFS toward player
      const path = bfsPath(maze, e.x, e.y, player.x, player.y);
      if (path.length > 0) { e.x += DX[path[0]]; e.y += DY[path[0]]; }
    } else {
      // Wander: pick a random valid direction
      const dirs = [0,1,2,3].filter(d => !(maze[e.y][e.x] & (1<<d)));
      if (dirs.length > 0) {
        const d = dirs[Math.floor(Math.random() * dirs.length)];
        e.x += DX[d]; e.y += DY[d];
      }
    }
  }
  checkDeath();
}

// --- DRAWING ---
let tick = 0;

function drawMaze() {
  // Floor
  ctx.fillStyle = PAL.floor;
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  ctx.strokeStyle = '#110825';
  ctx.lineWidth = 0.5;
  for (let y = 0; y < ROWS; y++) for (let x = 0; x < COLS; x++) {
    ctx.strokeRect(x*TILE, y*TILE, TILE, TILE);
  }

  // Torch light
  for (const t of torches) {
    const r = 60 + Math.sin(tick*0.07 + t.flicker*10)*8;
    const grad = ctx.createRadialGradient(t.x*TILE+TILE/2, t.y*TILE+TILE/2, 2, t.x*TILE+TILE/2, t.y*TILE+TILE/2, r);
    grad.addColorStop(0, 'rgba(255,150,0,0.18)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(t.x*TILE-r, t.y*TILE-r, r*2, r*2);
  }

  // Walls
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      const px = x*TILE, py = y*TILE;
      const cell = maze[y][x];
      ctx.strokeStyle = PAL.wallHL;
      ctx.lineWidth = 3;
      ctx.lineCap = 'square';

      // N wall
      if (cell & 1) { ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px+TILE,py); ctx.stroke(); }
      // E wall
      if (cell & 2) { ctx.beginPath(); ctx.moveTo(px+TILE,py); ctx.lineTo(px+TILE,py+TILE); ctx.stroke(); }
      // S wall
      if (cell & 4) { ctx.beginPath(); ctx.moveTo(px,py+TILE); ctx.lineTo(px+TILE,py+TILE); ctx.stroke(); }
      // W wall
      if (cell & 8) { ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px,py+TILE); ctx.stroke(); }

      // Fill wall blocks
      ctx.fillStyle = PAL.wall;
      if ((cell&1)) fillWallBlock(px, py, 'n');
      if ((cell&2)) fillWallBlock(px, py, 'e');
      if ((cell&4)) fillWallBlock(px, py, 's');
      if ((cell&8)) fillWallBlock(px, py, 'w');
    }
  }
}

function fillWallBlock(px, py, side) {
  const T = 5;
  ctx.fillStyle = PAL.wall;
  switch(side) {
    case 'n': ctx.fillRect(px, py, TILE, T); break;
    case 'e': ctx.fillRect(px+TILE-T, py, T, TILE); break;
    case 's': ctx.fillRect(px, py+TILE-T, TILE, T); break;
    case 'w': ctx.fillRect(px, py, T, TILE); break;
  }
}

function drawTorches() {
  for (const t of torches) {
    const px = t.x*TILE + TILE/2, py = t.y*TILE + TILE/2;
    const flick = Math.sin(tick*0.15 + t.flicker*10);
    ctx.fillStyle = `rgba(255,${150+flick*40|0},0,0.9)`;
    ctx.fillRect(px-2, py-4, 4, 6);
    // flame
    ctx.fillStyle = `rgba(255,${200+flick*55|0},0,0.7)`;
    ctx.fillRect(px-1, py-6+flick, 2, 4);
  }
}

function drawExit() {
  const px = exit.x*TILE, py = exit.y*TILE;
  const pulse = Math.sin(tick*0.08)*0.5+0.5;
  // Glow
  const grad = ctx.createRadialGradient(px+TILE/2, py+TILE/2, 2, px+TILE/2, py+TILE/2, TILE);
  grad.addColorStop(0, `rgba(0,255,200,${0.3+pulse*0.3})`);
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(px-TILE, py-TILE, TILE*3, TILE*3);
  // Star
  ctx.fillStyle = PAL.exit;
  drawStar(px+TILE/2, py+TILE/2, 7+pulse*3, 4);
  ctx.fillStyle = '#ffffff';
  drawStar(px+TILE/2, py+TILE/2, 3, 4);
}

function drawStar(cx, cy, r, points) {
  ctx.beginPath();
  for (let i = 0; i < points*2; i++) {
    const a = (i/points/2)*Math.PI*2 - Math.PI/2;
    const rr = i%2===0 ? r : r*0.45;
    ctx.lineTo(cx + Math.cos(a)*rr, cy + Math.sin(a)*rr);
  }
  ctx.closePath(); ctx.fill();
}

function drawItems() {
  for (const it of items) {
    if (it.collected) continue;
    const px = it.x*TILE+TILE/2, py = it.y*TILE+TILE/2;
    const pulse = Math.sin(tick*0.1 + it.x*0.3 + it.y*0.2)*2;
    // gem
    ctx.fillStyle = PAL.gem;
    ctx.beginPath();
    ctx.moveTo(px, py-5-pulse*0.3);
    ctx.lineTo(px+4, py-1);
    ctx.lineTo(px+4, py+3);
    ctx.lineTo(px, py+5);
    ctx.lineTo(px-4, py+3);
    ctx.lineTo(px-4, py-1);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillRect(px-2, py-3, 2, 2);
  }
}

function drawPlayer() {
  if (state === 'dead' && Math.floor(deathTimer/8)%2===0) return; // flash on death
  if (invincibleTimer > 0 && Math.floor(tick/5)%2===0) return; // blink while invincible
  const isInvincible = invincibleTimer > 0;
  const px = player.x*TILE, py = player.y*TILE;
  const cx = px+TILE/2, cy = py+TILE/2;

  // Body glow
  const glowColor = isInvincible ? '0,220,255' : '0,255,68';
  const grad = ctx.createRadialGradient(cx, cy, 1, cx, cy, isInvincible ? 18 : 14);
  grad.addColorStop(0, `rgba(${glowColor},0.5)`);
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad; ctx.fillRect(px-18, py-18, 50, 50);

  // Body (pixel-art humanoid)
  ctx.fillStyle = isInvincible ? '#00ddff' : PAL.player;
  // helmet
  ctx.fillRect(cx-4, cy-10, 8, 5);
  // head
  ctx.fillRect(cx-3, cy-7, 6, 6);
  // visor
  ctx.fillStyle = '#00ccff';
  ctx.fillRect(cx-2, cy-6, 4, 2);
  // body
  ctx.fillStyle = isInvincible ? '#00ddff' : PAL.player;
  ctx.fillRect(cx-4, cy-1, 8, 7);
  // legs
  ctx.fillRect(cx-3, cy+6, 2, 4);
  ctx.fillRect(cx+1, cy+6, 2, 4);
  // arms
  ctx.fillRect(cx-6, cy-1, 2, 5);
  ctx.fillRect(cx+4, cy-1, 2, 5);
  // sword
  ctx.fillStyle = '#aaaaff';
  ctx.fillRect(cx+5, cy-5, 1, 7);
  ctx.fillStyle = '#ffdd00';
  ctx.fillRect(cx+4, cy-1, 3, 1);
}

function drawEnemies() {
  for (const e of enemies) {
    const px = e.x*TILE, py = e.y*TILE;
    const cx = px+TILE/2, cy = py+TILE/2;
    const blink = Math.sin(tick*0.2+e.x)*0.5+0.5;

    // Glow
    const grad = ctx.createRadialGradient(cx, cy, 1, cx, cy, 12);
    grad.addColorStop(0, `rgba(255,${30+blink*30|0},${30+blink*30|0},0.4)`);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad; ctx.fillRect(px-12, py-12, 38, 38);

    // Minotaur body
    ctx.fillStyle = PAL.enemy;
    // bull head/horns
    ctx.fillRect(cx-2, cy-12, 4, 4);
    ctx.fillRect(cx-6, cy-11, 2, 3);
    ctx.fillRect(cx+4, cy-11, 2, 3);
    // snout
    ctx.fillRect(cx-3, cy-9, 6, 4);
    ctx.fillStyle = '#330000';
    ctx.fillRect(cx-2, cy-8, 1, 2); // left eye
    ctx.fillRect(cx+1, cy-8, 1, 2); // right eye
    // body
    ctx.fillStyle = PAL.enemy;
    ctx.fillRect(cx-5, cy-5, 10, 8);
    // legs
    ctx.fillRect(cx-4, cy+3, 3, 5);
    ctx.fillRect(cx+1, cy+3, 3, 5);
    // arms
    ctx.fillRect(cx-8, cy-4, 3, 5);
    ctx.fillRect(cx+5, cy-4, 3, 5);
    // axe
    ctx.fillStyle = '#888';
    ctx.fillRect(cx+7, cy-8, 1, 8);
    ctx.fillStyle = '#ccc';
    ctx.fillRect(cx+7, cy-8, 4, 4);
  }
}

function drawParticles() {
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

function drawHUD_canvas() {
  // Gems collected
  const total = items.length;
  const collected = items.filter(it=>it.collected).length;
  ctx.fillStyle = PAL.gem;
  drawStar(10, H-10, 5, 4);
  ctx.fillStyle = '#fff';
  ctx.font = '11px monospace';
  ctx.fillText(`${collected}/${total}`, 18, H-5);

  // Invincibility indicator
  if (invincibleTimer > 0 && Math.floor(tick/6)%2===0) {
    ctx.fillStyle = '#00ddff';
    ctx.font = 'bold 11px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('SHIELD', W/2, H-5);
    ctx.textAlign = 'left';
  }
}

function drawLevelUp() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = PAL.exit;
  ctx.font = 'bold 36px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('LEVEL CLEAR!', W/2, H/2 - 20);
  ctx.fillStyle = '#fff';
  ctx.font = '16px monospace';
  ctx.fillText(`+${500 * level} BONUS`, W/2, H/2 + 16);
  ctx.fillText(`LEVEL ${level+1}`, W/2, H/2 + 40);
  ctx.textAlign = 'left';
}

function drawDead() {
  if (Math.floor(deathTimer/8)%2===0) {
    ctx.fillStyle = 'rgba(200,0,0,0.2)';
    ctx.fillRect(0, 0, W, H);
  }
}

// --- OVERLAY ---
function showOverlay(type) {
  overlay.innerHTML = '';
  overlay.style.display = 'flex';
  if (type === 'gameover') {
    overlay.innerHTML = `
      <h1>GAME OVER</h1>
      <div class="gameover-score">SCORE: ${score}</div>
      <div class="press-start">PRESS SPACE TO RETRY</div>
    `;
  }
}

function hideOverlay() {
  overlay.style.display = 'none';
}

// --- GAME LOOP ---
function startGame() {
  score = 0; lives = 3; level = 1;
  state = 'playing';
  hideOverlay();
  initLevel();
}

function update() {
  tick++;
  if (state === 'playing') {
    stepTimer++;
    if (stepTimer >= 7) { stepTimer = 0; tryMove(); }
    invincibleTimer = Math.max(0, invincibleTimer - 1);
    moveEnemies();
    updateParticles();
    flashTimer = Math.max(0, flashTimer-1);
  } else if (state === 'dead') {
    updateParticles();
    deathTimer--;
    if (deathTimer <= 0) {
      player.x = 0; player.y = 0;
      for (const en of enemies) { en.x = en.spawnX; en.y = en.spawnY; }
      invincibleTimer = 180;
      state = 'playing';
    }
  } else if (state === 'levelup') {
    updateParticles();
    levelTimer--;
    if (levelTimer <= 0) {
      level++;
      state = 'playing';
      sfxLevel();
      initLevel();
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  if (state === 'title') {
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);
    return;
  }

  drawMaze();
  drawTorches();
  drawExit();
  drawItems();
  drawEnemies();
  drawPlayer();
  drawParticles();
  drawHUD_canvas();

  if (state === 'levelup') drawLevelUp();
  if (state === 'dead') drawDead();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// --- INIT ---
updateHUD();
loop();
</script>
</body>
</html>
